; PlatformIO configuration for ESP32 OBD-II BLE Bridge
; Connects to Veepeak OBDCheck BLE adapter, polls XPENG G6 PIDs,
; and publishes to Home Assistant via MQTT auto-discovery.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = log2file

lib_deps =
    h2zero/NimBLE-Arduino@^2.2.3
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.3.1

build_flags =
    -DCONFIG_NIMBLE_CPP_ENABLE_ADVERTISEMENT=0
    -DCONFIG_NIMBLE_CPP_ENABLE_GAP=1
    -DCONFIG_NIMBLE_CPP_ENABLE_GATT_CLIENT=1
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=1

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^2.2.3
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.3.1

build_flags =
    -DCONFIG_NIMBLE_CPP_ENABLE_ADVERTISEMENT=0
    -DCONFIG_NIMBLE_CPP_ENABLE_GAP=1
    -DCONFIG_NIMBLE_CPP_ENABLE_GATT_CLIENT=1
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=1
