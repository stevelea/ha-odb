; PlatformIO Project Configuration — obd2-mqtt WiFi Fork
; Standard ESP32, WiFi + Bluetooth Classic + MQTT + Web UI

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32 @ ^6.11.0
framework = arduino
board = esp32dev
board_build.partitions = partition-custom.csv
extra_scripts = pre:build_ui.py
monitor_filters = log2file
lib_compat_mode = strict
build_flags =
    -fno-exceptions
    -DOTA_ENABLED=1
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_COMPILER_OPTIMIZATION_SIZE=1
    -DARDUINOJSON_DECODE_UNICODE=0
    -DARDUINOJSON_ENABLE_ARDUINO_STREAM=0
    -DARDUINOJSON_ENABLE_COMMENTS=0
    -DARDUINOJSON_ENABLE_NAN=0
    -DARDUINOJSON_ENABLE_INFINITY=0
    -DARDUINOJSON_NEGATIVE_EXPONENTIATION_THRESHOLD=0
    -DARDUINOJSON_POSITIVE_EXPONENTIATION_THRESHOLD=0
    -DARDUINOJSON_USE_LONG_LONG=0
    -DESP32_DEVICE
    '-DBUILD_GIT_BRANCH="wifi-fork"'
    '-DBUILD_GIT_COMMIT_HASH="local"'
lib_deps =
    powerbroker2/ELMDuino @ ^3.4.0
    PubSubClient @ ^2.8
    ArduinoJson @ ^7.2.1
    vshymanskyy/StreamDebugger @ ^1.0.1
    mathieucarbou/AsyncTCP @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
